# docker-compose.yaml — replace entire file with this
services:
  db:
    image: postgres:15
    container_name: talash_db
    restart: always
    environment:
      POSTGRES_USER: talash
      POSTGRES_PASSWORD: talash123
      POSTGRES_DB: talash_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: